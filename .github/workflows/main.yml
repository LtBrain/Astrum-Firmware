name: STM32 CMake CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # Replaced the broken arm-software action with the standard one
      - name: Install ARM GNU Toolchain
        uses: carlosperate/arm-none-eabi-gcc-action@v1
        with:
          release: 'latest' # Or specify a version like '13.2.Rel1'

      - name: Install Ninja & CMake
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build cmake

      - name: Install Cppcheck
        run: sudo apt-get install -y cppcheck

      - name: Configure CMake (Updated with Export)
        # We add -DCMAKE_EXPORT_COMPILE_COMMANDS=ON so Cppcheck knows your include paths
        run: >
          cmake -B build -G "Ninja" 
          -DCMAKE_TOOLCHAIN_FILE=${{ github.workspace }}/cmake/gcc-arm-none-eabi.cmake
          -DCMAKE_EXPORT_COMPILE_COMMANDS=ON

      - name: Run Cppcheck Static Analysis
        # --project uses the json file generated by CMake to find all your headers
        # --error-exitcode=1 ensures the CI fails if a bug is found
        run: >
          cppcheck --project=build/compile_commands.json 
          --enable=all --inconclusive --force --inline-suppr
          --suppress=missingIncludeSystem --error-exitcode=1
          -i build/

      - name: Build Firmware
        run: cmake --build build --parallel

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: stm32-binaries
          path: |
            build/*.elf
            build/*.bin
